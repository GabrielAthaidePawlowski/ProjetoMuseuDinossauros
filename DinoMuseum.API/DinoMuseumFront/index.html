<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DinoMuseum 🦖</title>
    <style>
        /* Um estilo rápido para parecer um museu */
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .menu-eras { display: flex; justify-content: center; gap: 10px; margin: 20px; }
        .busca { text-align: center; margin-bottom: 30px; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: 1px solid #ccc; }
        
        /* Grid dos Cards */
        #lista-dinos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; padding: 20px; 
        }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; hieght: 200px; object-fit: cover; border-radius: 5px; }

        .menu-eras button {
    padding: 10px 20px;
    border: none;
    background: #34495e;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

.menu-eras button:hover {
    background: #1abc9c;
}
    </style>
</head>
<body>

<header>
    <h1>DinoMuseum 🦖</h1>
    <div class="menu-eras" id="menu-eras">
        <button onclick="filtrarPorEra('todas')">Todas as Eras</button>
    </div>
</header>

<div class="busca">
    <input type="text" id="inputBusca" placeholder="Pesquisar dinossauro..." onkeyup="buscar()">
</div>

<div id="lista-dinos">
    </div>

<script>
    let todosOsDinos = [];
    let todasAsEras = [];

    async function carregarDados() {
        try {
            // Busca os Dinos e as Eras ao mesmo tempo
            const [resDinos, resEras] = await Promise.all([
                fetch('http://localhost:5180/api/Dinossauro'),
                fetch('http://localhost:5180/api/Era')
            ]);

            todosOsDinos = await resDinos.json();
            todasAsEras = await resEras.json();

            exibirEras(todasAsEras);
            exibirDinos(todosOsDinos);
        } catch (error) {
            console.error("Erro ao carregar dados:", error);
        }
    }

    // Cria os botões de Eras dinamicamente lá no topo
    function exibirEras(eras) {
        const menu = document.getElementById('menu-eras');
        // Mantém o botão "Todas" e adiciona os outros
        menu.innerHTML = `<button onclick="filtrarPorEra('todas')">Todas as Eras</button>` + 
            eras.map(era => `
                <button onclick="filtrarPorEra('${era.id}')">${era.nome}</button>
            `).join('');
    }

    function exibirDinos(lista) {
    const container = document.getElementById('lista-dinos');
    container.innerHTML = lista.map(dino => {
        
        // Agora usamos o nome exato que apareceu no seu JSON
        const urlFinal = dino.imagemUrl || 'https://via.placeholder.com/250x150?text=Sem+Foto';
        
        return `
            <div class="card">
                <div style="height: 180px; overflow: hidden; border-radius: 5px; background: #eee;">
                    <img src="${urlFinal}" 
                         alt="${dino.nome}" 
                         style="width: 100%; height: 100%; object-fit: cover;"
                         onerror="this.src='https://via.placeholder.com/250x150?text=Erro+na+Imagem'">
                </div>
                <h3 style="margin: 10px 0 5px 0;">${dino.nome}</h3>
                <p style="color: #666; margin: 0;"><i>${dino.especie}</i></p>
                <p style="font-size: 14px; margin: 10px 0 0 0;">📍 ${dino.regiao}</p>
            </div>
        `;
    }).join('');
}

    // Lógica dos Submenus (Filtrar por Era)
    function filtrarPorEra(eraId) {
        if (eraId === 'todas') {
            exibirDinos(todosOsDinos);
        } else {
            const filtrados = todosOsDinos.filter(d => d.eraId === eraId);
            exibirDinos(filtrados);
        }
    }

    function buscar() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        const filtrados = todosOsDinos.filter(d => 
            d.nome.toLowerCase().includes(termo) || 
            d.especie.toLowerCase().includes(termo)
        );
        exibirDinos(filtrados);
    }

    carregarDados();
</script>

</body>
</html>
